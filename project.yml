name: SmartWardrobe
options:
  bundleIdPrefix: com.smartwardrobe
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: ""

targets:
  SmartWardrobe:
    type: application
    platform: iOS
    sources:
      - SmartWardrobe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartwardrobe.SmartWardrobe
        INFOPLIST_FILE: SmartWardrobe/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies: []
