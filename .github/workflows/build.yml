name: Build iOS App

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SmartWardrobe
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          set -o pipefail
          xcodebuild \
            -project SmartWardrobe.xcodeproj \
            -scheme SmartWardrobe \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log

      - name: List build products
        if: always()
        run: find build/DerivedData -name "*.app" -type d || echo "No .app found"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: SmartWardrobe-app
          path: build/DerivedData/Build/Products/**/SmartWardrobe.app
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
