name: Build iOS App

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SmartWardrobe
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project SmartWardrobe.xcodeproj \
            -scheme SmartWardrobe \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build.log | xcpretty --color || true

      - name: Locate app bundle
        id: locate
        run: |
          APP_PATH=$(find build/DerivedData/Build/Products -name "SmartWardrobe.app" -type d | head -1)
          echo "app_path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "Found app at: $APP_PATH"
          ls -la "$(dirname "$APP_PATH")" || true

      - name: Upload app artifact
        if: steps.locate.outputs.app_path != ''
        uses: actions/upload-artifact@v4
        with:
          name: SmartWardrobe.app
          path: ${{ steps.locate.outputs.app_path }}
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7
