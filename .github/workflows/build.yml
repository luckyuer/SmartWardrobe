name: Build iOS App

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build SmartWardrobe
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: |
          xcodebuild \
            -project SmartWardrobe.xcodeproj \
            -scheme SmartWardrobe \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=17.5' \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color || true

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartWardrobe.app
          path: build/DerivedData/Build/Products/Debug-iphonesimulator/SmartWardrobe.app
          retention-days: 30

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/**/*.xcactivitylog
          retention-days: 7
